name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04_system/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 04_system/web/package-lock.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build static export
        env:
          # 레포명과 동일해야 함. 레포명을 바꾸면 이 값도 함께 변경.
          NEXT_PUBLIC_BASE_PATH: /pangyo-cheongna-analysis
          # V-World 키(클라이언트 노출)는 레포 Secret으로 주입. 미설정/미등록 도메인이면 OSM 자동 폴백.
          NEXT_PUBLIC_VWORLD_API_KEY: ${{ secrets.NEXT_PUBLIC_VWORLD_API_KEY }}
        run: npm run build
      - name: Disable Jekyll
        run: touch out/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 04_system/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
